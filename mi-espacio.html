<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="noindex,nofollow"><link rel="icon" href="Logo.png" type="image/png"><link rel="stylesheet" href="styles.css"><title>Mi espacio — MD Studio</title></head>
<body><header class="site"><div class="wrap"><a href="index.html" class="brand"><img src="Logo.png" alt="MD Studio" class="brand-logo brand-logo--scaled"></a><nav class="paths"><a href="#" id="logout">cerrar sesión</a></nav></div></header>
<main class="paper portal-admin"><div class="wrap"><p class="eyebrow">Área de cliente</p><h1 id="welcome">Tu espacio de proyecto.</h1><p class="section-intro">Aquí tienes los enlaces y avances compartidos por MD Studio.</p><div id="projects" class="grid-projects"></div><p id="projects-message" class="form-note" role="status"></p></div></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script src="portal.js"></script><script>
document.querySelector('#logout').addEventListener('click', event => { event.preventDefault(); mdPortal.signOut(); });
(async () => { try { const user = await mdPortal.requireUser(); if (!user) return; const profile = await mdPortal.profile(user.id); if (profile.role === 'admin') return window.location.replace('administracion.html'); document.querySelector('#welcome').textContent = `Hola, ${profile.display_name || 'cliente'}.`; const { data, error } = await mdPortal.client.from('client_projects').select('title, description, project_url, status').eq('owner_id', user.id).order('created_at', { ascending: false }); if (error) throw error; document.querySelector('#projects').innerHTML = data.map(project => `<a class="card card-link" href="${project.project_url || '#'}" ${project.project_url ? 'target="_blank" rel="noopener"' : ''}><div class="meta"><span>${project.status}</span><span>proyecto</span></div><h3>${project.title}</h3><p>${project.description || 'Próximamente tendrás novedades aquí.'}</p></a>`).join(''); document.querySelector('#projects-message').textContent = data.length ? '' : 'Todavía no tienes proyectos publicados.'; } catch (error) { document.querySelector('#projects-message').textContent = error.message; } })();
</script></body></html>
